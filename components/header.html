<header class="header" id="global-header">
    <div class="logo">
        <a href="index.html" style="display: flex; align-items: center; text-decoration: none; cursor: pointer;">
            <img src="vistas_pedidos/uploads/logo.png" alt="TAM" onerror="this.src='https://via.placeholder.com/140x42/0d47a1/ffffff?text=TAM'">
        </a>
    </div>

    <!-- Botón MENÚ -->
    <div class="menu" id="menuToggle">
        <i class="fas fa-bars"></i>
        <span>MENÚ</span>
    </div>
    
    <!-- Dropdown del menú (categorías) -->
    <div class="menu-dropdown" id="menuDropdown">
        <a href="catalogo.html?cat=consolas"><i class="fas fa-gamepad"></i> Consolas</a>
        <a href="catalogo.html?cat=portatiles"><i class="fas fa-laptop"></i> Laptops</a>
        <a href="catalogo.html?cat=celulares"><i class="fas fa-mobile-alt"></i> Celulares</a>
        <a href="catalogo.html?cat=accesorios"><i class="fas fa-headphones"></i> Accesorios</a>
    </div>

    <!-- Barra de búsqueda -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar productos...">
        <button id="searchButton">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
        </button>
    </div>

    <!-- Navegación principal -->
    <nav class="main-nav">
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="catalogo.html" class="nav-link"><i class="fas fa-th-large"></i><span>Catálogo</span></a>
        <a href="comparador.html" class="nav-link"><i class="fas fa-balance-scale"></i><span>Comparador</span></a>
        <a href="carrito.html" class="nav-link"><i class="fas fa-shopping-cart"></i><span>Carrito</span><span id="navCartCount" class="nav-cart-count">0</span></a>
        <a href="contacto.html" class="nav-link"><i class="fas fa-phone"></i><span>Contacto</span></a>
    </nav>

    <!-- Iconos de usuario -->
    <div class="user-icons">
        <svg id="userIcon" onclick="logout()" title="Cerrar sesión" viewBox="0 0 24 24" width="22" height="22" fill="white">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <svg id="notificationsIcon" title="Notificaciones" viewBox="0 0 24 24" width="22" height="22" fill="white">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.93 6 11v5l-2 2v1h16v-1l-2-2z"/>
        </svg>
        <svg id="messagesIcon" title="Mensajes" viewBox="0 0 24 24" width="22" height="22" fill="white">
            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"/>
        </svg>
        <svg id="favoritesIcon" title="Favoritos" viewBox="0 0 24 24" width="22" height="22" fill="white">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </div>
</header>

<script>
    // ======================================================
    // FUNCIONES DEL HEADER
    // ======================================================
    
    // Destacar enlace activo según la página actual
    function highlightActiveNavLink() {
        const currentPage = window.location.pathname.split('/').pop();
        const navLinks = document.querySelectorAll('.nav-link');
        
        navLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href) {
                const linkPage = href.split('/').pop();
                if (currentPage === linkPage) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            }
        });
    }
    
    // Inicializar menú desplegable
    function initMenuDropdown() {
        const menuToggle = document.getElementById('menuToggle');
        const menuDropdown = document.getElementById('menuDropdown');
        
        if (menuToggle && menuDropdown) {
            menuToggle.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                menuToggle.classList.toggle('open');
                menuDropdown.style.display = menuToggle.classList.contains('open') ? 'block' : 'none';
            });
            
            document.addEventListener('click', function(evt) {
                if (!menuToggle.contains(evt.target) && !menuDropdown.contains(evt.target)) {
                    menuToggle.classList.remove('open');
                    menuDropdown.style.display = 'none';
                }
            });
        }
    }
    
    // Actualizar contador del carrito
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('tamCart')) || [];
        const cartCount = document.getElementById('navCartCount');
        if (cartCount) {
            const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            cartCount.textContent = totalItems;
        }
    }
    
    // Inicializar búsqueda
    function initSearch() {
        const searchButton = document.getElementById('searchButton');
        const searchInput = document.getElementById('searchInput');
        
        if (searchButton && searchInput) {
            searchButton.addEventListener('click', () => {
                const searchTerm = searchInput.value.trim();
                if (searchTerm) {
                    window.location.href = `catalogo.html?search=${encodeURIComponent(searchTerm)}`;
                }
            });
            
            searchInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    const searchTerm = e.target.value.trim();
                    if (searchTerm) {
                        window.location.href = `catalogo.html?search=${encodeURIComponent(searchTerm)}`;
                    }
                }
            });
        }
    }
    
    // Función de logout global
    window.logout = function() {
        if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    };
    
    // ======================================================
    // INICIALIZACIÓN
    // ======================================================
    highlightActiveNavLink();
    initMenuDropdown();
    updateCartCount();
    initSearch();
    
    window.addEventListener('storage', (e) => {
        if (e.key === 'tamCart') updateCartCount();
    });


    
</script>
