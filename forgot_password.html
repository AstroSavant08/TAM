<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - TAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <img src="vistas_pedidos/uploads/logo.png" alt="TAM Logo" onerror="this.src='https://via.placeholder.com/120x50/0d47a1/ffffff?text=TAM'" style="max-height: 50px; background: #0d47a1; padding: 5px; border-radius: 4px;">
        </div>

        <h2 style="text-align: center; margin-bottom: 20px;">Recuperar Contraseña</h2>

        <form id="forgotForm" class="auth-form active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="forgotEmail" required placeholder="Ingresa tu email registrado">
            </div>
            <button type="submit" class="btn-block">Enviar Enlace de Recuperación</button>
            <p id="forgotMessage" class="message"></p>
            <a href="login.html" class="forgot-password-link">Volver al Login</a>
        </form>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value.trim();
            const msg = document.getElementById('forgotMessage');

            if (!email) {
                msg.className = 'message error';
                msg.textContent = 'Por favor ingresa tu email.';
                return;
            }

            // Enviar al backend
            fetch('backend/forgot_password.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    msg.className = 'message success';
                    msg.textContent = data.message;
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.message;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                msg.className = 'message error';
                msg.textContent = 'Error de conexión.';
            });
        });
    </script>
</body>
</html></content>
